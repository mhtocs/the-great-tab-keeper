<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>slept, The Great Tab Keeper</title>
  </head>
  <body class="min-h-screen bg-gray-50">
    <main
      class="mx-auto flex min-h-screen w-full max-w-md flex-col items-center justify-center gap-5 p-6 text-center"
    >
      <p class="text-sm text-gray-500">slept by the great tab keeper</p>

      <div class="w-full space-y-2">
        <p id="title" class="text-base font-medium text-gray-900"></p>
        <p
          id="url"
          class="break-all font-mono text-xs leading-relaxed text-gray-600"
        ></p>
        <p id="memory" class="text-sm text-gray-500" hidden></p>
      </div>

      <button
        type="button"
        id="reload"
        class="rounded border border-gray-300 bg-white px-4 py-2 text-sm text-gray-700 transition-colors hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-50"
      >
        reload
      </button>
      <p id="error" class="text-sm text-red-600" hidden></p>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
